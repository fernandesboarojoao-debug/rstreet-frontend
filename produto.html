<script>

const SUPABASE_URL = 'https://dxttqvmrpfwxsgrpancz.supabase.co';  // ← cole sua URL
const SUPABASE_KEY = 'sb_publishable_TxSQPVP-gFjgTst7fTj4tw_G2qw7ssn';                // ← cole sua chave
const WHATSAPP     = '5519993111599';
// ═══════════════════════════════════════════════

let product = null;
let allProducts = [];
let productVariants = [];
let selectedColor = null;
let selectedSize = null;

const productParams = new URLSearchParams(window.location.search);
const productId = parseInt(productParams.get('id'));
const requestedColor = productParams.get('cor') || productParams.get('color') || '';

async function init() {
  // Sem credenciais configuradas → usa dados de exemplo
  if (!SUPABASE_URL || !SUPABASE_KEY) {
    allProducts = getDemoProducts();
    product = allProducts.find(p => p.id === productId) || null;
    finish();
    return;
  }

  try {
    // Busca só este produto pelo ID + alguns produtos relacionados
    const [r1, r2, r3] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&id=eq.${productId}`, {
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&ativo=eq.true&order=criado_em.desc&limit=20`, {
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/produto_variantes?select=*&produto_id=eq.${productId}&ativo=eq.true&order=ordem.asc,cor.asc,tamanho.asc`, {
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
      })
    ]);
    if (!r1.ok) throw new Error('HTTP ' + r1.status);
    const arr = await r1.json();
    product = arr[0] || null;
    if (r2.ok) allProducts = await r2.json();
    if (r3.ok) productVariants = await r3.json();
  } catch (err) {
    console.warn('Supabase erro:', err.message);
    allProducts = getDemoProducts();
    product = allProducts.find(p => p.id === productId) || null;
  }

  finish();
}

async function refreshProduct() {
  if (!SUPABASE_URL || !SUPABASE_KEY || !productId) return;
  try {
    const [r1, r2, r3] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&id=eq.${productId}`, {
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&ativo=eq.true&order=criado_em.desc&limit=20`, {
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/produto_variantes?select=*&produto_id=eq.${productId}&ativo=eq.true&order=ordem.asc,cor.asc,tamanho.asc`, {
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
      })
    ]);
    if (!r1.ok) return;
    const arr = await r1.json();
    product = arr[0] || null;
    if (r2.ok) allProducts = await r2.json();
    if (r3.ok) productVariants = await r3.json();
    syncCartWithStock();
    finish();
  } catch {}
}

function finish() {
  if (!product) {
    document.getElementById('mainContent').innerHTML = `
      <div class="not-found">
        <div class="not-found-icon">🔍</div>
        <div class="not-found-title">Produto não encontrado</div>
        <div class="not-found-sub">Este produto pode ter sido removido ou o link está incorreto.</div>
        <a href="catalogo.html" style="margin-top:16px;color:var(--gold);text-decoration:none;font-weight:600;border:1px solid rgba(200,169,110,0.4);padding:12px 28px;border-radius:2px;display:inline-block;">← Voltar ao catálogo</a>
      </div>`;
    return;
  }
  renderProduct();
  renderRelated();
  document.title = product.nome + ' | R Street';
  updateProductSeo(product);
  document.getElementById('breadcrumbName').textContent = product.nome;
}

function updateProductSeo(p) {
  const url = `https://www.rstreet.com.br/produto.html?id=${encodeURIComponent(p.id)}`;
  const description = `${p.nome} na R Street. Consulte cores, tamanhos disponiveis e estoque atualizado.`;
  document.title = `${p.nome} | R Street`;
  const metaDescription = document.querySelector('meta[name="description"]');
  const canonical = document.querySelector('link[rel="canonical"]');
  const ogTitle = document.querySelector('meta[property="og:title"]');
  const ogDescription = document.querySelector('meta[property="og:description"]');
  const ogUrl = document.querySelector('meta[property="og:url"]');
  if (metaDescription) metaDescription.setAttribute('content', description);
  if (canonical) canonical.setAttribute('href', url);
  if (ogTitle) ogTitle.setAttribute('content', p.nome);
  if (ogDescription) ogDescription.setAttribute('content', description);
  if (ogUrl) ogUrl.setAttribute('content', url);
}

function renderProduct() {

  let stockText  = p.estoque === 0 ? 'Esgotado'

    : currentStock <= 5 ? `Últimas ${currentStock} unidades`

      <span class="color-thumb">${data.thumbnail ? `<img src="${escapeAttr(data.thumbnail)}" alt="${escapeAttr(c)}">` : `<span class="color-swatch" style="background:${data.cor_hex || getColorValue(c)}"></span>`}</span>
      <span class="color-name">${escapeHtml(c)}</span>

        </div>
        ${thumbs}
      </div>

          </div>
        </div>

        <div class="stock-info">
          <div class="stock-dot ${stockClass}"></div>
          <span class="stock-text ${stockClass}">${stockText}</span>
        </div>

        ${sizes ? `<div class="section-label">Tamanho</div><div class="sizes-grid">${sizes}</div>` : ''}
        <div style="font-size:12px;color:var(--gray-400);line-height:1.7;margin:10px 0 18px">
          Guia rapido: P veste 36/38, M veste 40, G veste 42/44 e GG veste 46/48. Para medidas exatas, chame no WhatsApp.
        </div>

        <div class="product-actions">

          ${p.categoria ? `<div class="detail-item"><span class="detail-key">Categoria</span><span class="detail-val">${p.categoria}</span></div>` : ''}
          ${p.referencia ? `<div class="detail-item"><span class="detail-key">Referência</span><span class="detail-val">${p.referencia}</span></div>` : ''}
          ${(p.tamanhos||[]).length ? `<div class="detail-item"><span class="detail-key">Tamanhos</span><span class="detail-val">${p.tamanhos.join(' · ')}</span></div>` : ''}

        <div class="share-row">

          <button class="share-btn" onclick="copyLink()">🔗</button>
        </div>
      </div>
    </div>`;

  const cartBtn = document.getElementById('btnCarrinho');
  if (cartBtn) cartBtn.innerHTML = `<span style="font-size:20px">🛒</span> ${addText}`;

function changeImg(url, el) {
  changeMedia(url, 'image', el);
}

function renderProductAccordions(p) {
  const sections = [
    { key: 'descricao', title: 'Descrição', content: p.descricao || '' },
    { key: 'especificacoes', title: 'Especificações técnicas', content: p.especificacoes_tecnicas || '' },
    { key: 'conservacao', title: 'Dicas de conservação', content: p.dicas_conservacao || '' }
  ].filter(section => String(section.content || '').trim());

  if (!sections.length) return '';

  return `<div class="product-accordion">
    ${sections.map((section, index) => `
      <div class="product-accordion-item ${index === 0 ? 'open' : ''}" data-product-accordion="${section.key}">
        <button type="button" class="product-accordion-btn" onclick="toggleProductAccordion('${section.key}')">
          <span>${section.title}</span>
          <span class="product-accordion-icon">⌄</span>
        </button>
        <div class="product-accordion-content">${escapeHtml(section.content)}</div>
      </div>
    `).join('')}
  </div>`;
}

function toggleProductAccordion(key) {
  const item = document.querySelector(`[data-product-accordion="${key}"]`);
  if (!item) return;
  const shouldOpen = !item.classList.contains('open');
  document.querySelectorAll('.product-accordion-item').forEach(el => el.classList.remove('open'));
  if (shouldOpen) item.classList.add('open');
}

function changeMedia(url, type, el) {
  const wrap = document.querySelector('.gallery-main');
  if (wrap) {
    const badge = wrap.querySelector('.gallery-badge')?.outerHTML || '';
    wrap.innerHTML = `${renderMainMedia({ url, type }, product?.nome || 'Produto')}${badge}`;
  }
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el?.classList.add('active');
}

function renderMainMedia(media, alt) {
  if (media?.type === 'video') {
    return `<video id="mainImg" src="${escapeAttr(media.url)}" controls playsinline muted></video>`;
  }
  return `<img id="mainImg" src="${escapeAttr(media.url)}" alt="${escapeAttr(alt)}">`;
}

function renderThumbMedia(media, index) {
  if (media?.type === 'video') return `<video src="${escapeAttr(media.url)}" muted></video>`;
  return `<img src="${escapeAttr(media.url)}" alt="foto ${index + 1}">`;
}

function getActiveVariants() {
  return (productVariants || []).filter(v => v && v.ativo !== false);
}

function getVariantColors() {
  const colors = [...new Set(getActiveVariants().map(v => String(v.cor || '').trim()).filter(Boolean))];
  return colors.sort((a, b) => {
    const aOrder = Math.min(...getActiveVariants().filter(v => sameText(v.cor, a)).map(v => Number(v.ordem) || 0));
    const bOrder = Math.min(...getActiveVariants().filter(v => sameText(v.cor, b)).map(v => Number(v.ordem) || 0));
    return aOrder - bOrder || a.localeCompare(b);
  });
}

function getVariantSizes() {
  const list = selectedColor
    ? getActiveVariants().filter(v => sameText(v.cor, selectedColor))
    : getActiveVariants();
  return [...new Set(list.map(v => String(v.tamanho || '').trim()).filter(Boolean))];
}

function getVariantFor(cor, tamanho) {
  return getActiveVariants().find(v =>
    sameText(v.cor, cor) &&
    sameText(v.tamanho, tamanho)
  ) || null;
}

function sameText(a, b) {
  return String(a || '').trim().toLowerCase() === String(b || '').trim().toLowerCase();
}

function getSelectedVariant() {
  const variant = getVariantFor(selectedColor, selectedSize);
  return variant && Number(variant.estoque) > 0 ? variant : null;
}

function getProductImages() {
  return Array.isArray(product?.imagens) && product.imagens.length
    ? product.imagens
    : product?.imagem_url ? [product.imagem_url] : [];
}

function getVariantImages(variant) {
  if (!variant) return [];
  const imagens = Array.isArray(variant.imagens) ? variant.imagens.map(getStoredMediaUrl).filter(Boolean) : [];
  if (imagens.length) return imagens;
  const single = getStoredMediaUrl(variant.imagem_url);
  return single ? [single] : [];
}

function getVariantVideos(variant) {
  if (!variant) return [];
  return Array.isArray(variant.videos) ? variant.videos.filter(Boolean) : [];
}

function getStoredMediaUrl(url) {
  const clean = String(url || '').trim();
  return clean && !clean.toLowerCase().startsWith('data:') ? clean : '';
}

function getColorData(cor) {
  const list = getActiveVariants().filter(v => sameText(v.cor, cor));
  const withImages = list.find(v => getVariantImages(v).length) || list[0] || null;
  const withVideos = list.find(v => getVariantVideos(v).length) || null;
  const withPrice = list.find(v => v.preco !== null && v.preco !== undefined && v.preco !== '') || withImages;
  const imagens = getVariantImages(withImages);
  const videos = getVariantVideos(withVideos);
  const fallbackImages = getProductImages();
  const preco = Number(withPrice?.preco ?? product?.preco ?? 0);
  const hasColorVariants = list.length > 0;
  const precoAntigoRaw = hasColorVariants ? (withPrice?.preco_antigo ?? null) : (product?.preco_antigo ?? null);
  const mediaImages = (imagens.length ? imagens : fallbackImages).map(url => ({ type: 'image', url }));
  const mediaVideos = videos.map(url => ({ type: 'video', url }));
  return {
    cor,
    imagens: imagens.length ? imagens : fallbackImages,
    videos,
    medias: [...mediaImages, ...mediaVideos],
    thumbnail: imagens[0] || fallbackImages[0] || '',
    preco,
    preco_antigo: precoAntigoRaw ? Number(precoAntigoRaw) : null,
    cor_hex: withImages?.cor_hex || ''
  };
}

function getSelectedColorData() {
  return getColorData(selectedColor || getVariantColors()[0] || '');
}

function ensureVariantSelection() {
  const colors = getVariantColors();
  if (!colors.length) return;
  if (!selectedColor || !colors.includes(selectedColor)) {
    const requested = colors.find(c => sameText(c, requestedColor));
    const availableColor = colors.find(c => getActiveVariants().some(v => sameText(v.cor, c) && Number(v.estoque) > 0));
    if (requested) {
      selectedColor = requested;
      return;
    }
    selectedColor = availableColor || colors[0];
  }
  if (selectedSize) {
    const selected = getVariantFor(selectedColor, selectedSize);
    if (!selected || Number(selected.estoque) <= 0) selectedSize = null;
  }
}

function getCurrentStock() {
  const variants = getActiveVariants();
  if (!variants.length) return Math.max(0, Number(product?.estoque) || 0);
  const selected = getVariantFor(selectedColor, selectedSize);
  if (selected) return Math.max(0, Number(selected.estoque) || 0);
  const list = selectedColor ? variants.filter(v => sameText(v.cor, selectedColor)) : variants;
  return list.reduce((sum, v) => sum + Math.max(0, Number(v.estoque) || 0), 0);
}

function selectColor(cor) {
  selectedColor = cor;
  selectedSize = null;
  renderProduct();
  const btn = document.getElementById('wppBtn');
  if (btn) btn.href = buildWppLink();
}

function selectSize(size, el) {
  if (el?.disabled) return;
  selectedSize = size;
  renderProduct();
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[char]);
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/\\/g, '\\\\');
}

function getColorValue(cor) {
  const key = String(cor || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const colors = {
    preto: '#111111',
    black: '#111111',
    branco: '#f7f7f7',
    white: '#f7f7f7',
    azul: '#1f5fbf',
    marinho: '#172a4a',
    vermelho: '#c62828',
    red: '#c62828',
    verde: '#2e7d32',
    green: '#2e7d32',
    amarelo: '#f2c94c',
    dourado: '#c8a96e',
    cinza: '#777777',
    grafite: '#333333',
    bege: '#d8c4a0',
    creme: '#efe4ca',
    rosa: '#d96a9e',
    roxo: '#6b3fa0',
    laranja: '#e9782f',
    vinho: '#6d1f2a',
    caramelo: '#9b5c2e',
    off: '#f3eee2'
  };
  if (colors[key]) return colors[key];
  let hash = 0;
  for (let i = 0; i < key.length; i++) hash = key.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash) % 360}, 44%, 45%)`;
}

function buildWppLink() {
  if (!product) return '#';
  const price = getSelectedColorData().preco;
  const msg = `Olá! Tenho interesse no produto:\n*${product.nome}*${selectedColor ? `\nCor: *${selectedColor}*` : ''}${selectedSize ? `\nTamanho: *${selectedSize}*` : ''}\nReferência: ${product.referencia || '#'+product.id}\nValor: R$ ${fmt(price)}\n\nPode me ajudar?`;
  return `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`;
}

function renderRelated() {
  const rel = allProducts
    .filter(p => p.id !== product.id && p.ativo !== false &&
      (p.marca === product.marca || p.categoria === product.categoria))
    .slice(0, 4);
  if (!rel.length) return;
  document.getElementById('relatedSection').style.display = 'block';
  document.getElementById('relatedGrid').innerHTML = rel.map(p => {
    const imgs = Array.isArray(p.imagens) && p.imagens.length ? p.imagens : p.imagem_url ? [p.imagem_url] : [];
    return `<a class="related-card" href="produto.html?id=${p.id}">
      <div class="related-img">${imgs.length ? `<img src="${imgs[0]}" alt="${p.nome}">` : '👕'}</div>
      <div class="related-body">
        <div class="related-brand">${p.marca}</div>
        <div class="related-name">${p.nome}</div>
        <div class="related-price">R$ ${fmt(p.preco)}</div>
      </div>
    </a>`;
  }).join('');
}

function adicionarCarrinho() {
  if (!product) return;
  const hasVariants = getActiveVariants().length > 0;
  const selectedVariant = getSelectedVariant();
  const availableStock = hasVariants ? Number(selectedVariant?.estoque || 0) : Math.max(0, Number(product.estoque) || 0);

  if (hasVariants && !selectedVariant) {
    toast('Escolha uma cor e um tamanho disponivel.');
    return;
  }

  if (availableStock <= 0) {
    toast('Produto esgotado.');
    return;
  }
  const cart = JSON.parse(localStorage.getItem('rstreet_cart') || '[]');
  const colorData = getSelectedColorData();
  const imgs = colorData.imagens;
  const variantId = selectedVariant?.id || null;
  const existing = cart.find(i =>
    i.id === product.id &&
    (variantId ? i.produto_variante_id === variantId : i.tamanho === (selectedSize || '') && !i.produto_variante_id)
  );
  if (existing) {
    if (existing.qty >= availableStock) {
      toast(`Temos apenas ${availableStock} unidade(s) disponivel(is).`);
      return;
    }
    existing.qty += 1;
    existing.estoque = availableStock;
  } else {
    cart.push({
      id: product.id,
      produto_variante_id: variantId,
      nome: product.nome,
      marca: product.marca,
      preco: colorData.preco,
      cor: selectedColor || '',
      tamanho: selectedSize || '',
      referencia: product.referencia || '',
      imagem: imgs[0] || '',
      qty: 1,
      estoque: availableStock,
    });
  }
  localStorage.setItem('rstreet_cart', JSON.stringify(cart));
  const btn = document.getElementById('btnCarrinho');
  if (btn) {
    btn.innerHTML = '<span style="font-size:20px">✅</span> Adicionado!';
    btn.style.background = 'var(--green)';
    setTimeout(() => {
      btn.innerHTML = '<span style="font-size:20px">🛒</span> Adicionar ao Carrinho';
      renderProduct();
    }, 2000);
  }
  toast('✅ Produto adicionado ao carrinho!');
}

function syncCartWithStock() {
  const cart = JSON.parse(localStorage.getItem('rstreet_cart') || '[]');
  let changed = false;
  const next = cart.map(item => {
    const productRow = allProducts.find(p => p.id === item.id) || (product && product.id === item.id ? product : null);
    if (!productRow || productRow.ativo === false) {
      changed = true;
      return null;
    }
    let estoque = Math.max(0, Number(productRow.estoque) || 0);
    if (item.produto_variante_id && product && Number(item.id) === Number(product.id)) {
      const variant = productVariants.find(v => Number(v.id) === Number(item.produto_variante_id));
      estoque = (!variant || variant.ativo === false) ? 0 : Math.max(0, Number(variant.estoque) || 0);
    }
    if (estoque <= 0) {
      changed = true;
      return null;
    }
    const qty = Math.min(item.qty, estoque);
    if (qty !== item.qty || item.estoque !== estoque) changed = true;
    return { ...item, qty, estoque };
  }).filter(item => item && item.qty > 0);
  if (changed || next.length !== cart.length) {
    localStorage.setItem('rstreet_cart', JSON.stringify(next));
  }
}

function fmt(v) { return Number(v).toFixed(2).replace('.',','); }

function copyLink() {
  navigator.clipboard.writeText(window.location.href)
    .then(() => toast('✅ Link copiado!'))
    .catch(() => toast('❌ Não foi possível copiar.'));
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${msg}</span>`;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
