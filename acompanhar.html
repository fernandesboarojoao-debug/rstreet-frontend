<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhar Pedido | R Street</title>
<meta name="description" content="Acompanhe o status do seu pedido R Street usando o numero do pedido e e-mail.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.rstreet.com.br/acompanhar.html">
<link rel="icon" type="image/jpeg" href="/rstreet-social-image.jpg">
<link rel="apple-touch-icon" href="/rstreet-social-image.jpg">
<meta property="og:type" content="website">
<meta property="og:site_name" content="R Street">
<meta property="og:title" content="Acompanhar Pedido | R Street">
<meta property="og:description" content="Consulte pagamento, envio e rastreio do seu pedido R Street.">
<meta property="og:url" content="https://www.rstreet.com.br/acompanhar.html">
<meta property="og:image" content="https://www.rstreet.com.br/rstreet-social-image.jpg">
<meta property="og:image:secure_url" content="https://www.rstreet.com.br/rstreet-social-image.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="960">
<meta property="og:image:height" content="960">
<meta property="og:image:alt" content="Logo R Street Moda Masculina">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="https://www.rstreet.com.br/rstreet-social-image.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0a0a;--white:#fff;--gold:#c8a96e;--gray:#aaa;--surface:#151515;--border:rgba(255,255,255,.08);--red:#e63946;--green:#4caf50}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--black);color:var(--white);font-family:Inter,Arial,sans-serif;min-height:100vh}
  nav{padding:18px 7vw;border-bottom:1px solid rgba(200,169,110,.18);display:flex;justify-content:space-between;align-items:center}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:var(--white);text-decoration:none}.logo span{color:var(--gold)}
  nav a{color:var(--gray);text-decoration:none;font-size:13px;text-transform:uppercase;letter-spacing:1px}
  main{max-width:760px;margin:0 auto;padding:52px 20px 70px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,8vw,72px);letter-spacing:2px;color:var(--gold);line-height:.95;margin-bottom:18px}
  .intro{color:var(--gray);line-height:1.7;margin-bottom:28px}
  .box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1.3px;color:var(--gold);margin-bottom:8px}
  input{width:100%;background:#0f0f0f;border:1px solid var(--border);color:var(--white);padding:14px;border-radius:4px;margin-bottom:14px;font-size:15px}
  button{width:100%;background:var(--gold);color:#111;border:0;padding:15px;border-radius:4px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer}
  .msg{margin-top:16px;padding:14px;border-radius:4px;display:none}
  .msg.error{display:block;background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.35);color:#ff8b94}
  .result{display:none;margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px}
  .result.open{display:block}
  .row{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);padding:10px 0;color:#ddd}
  .row strong{color:var(--gold)}
  .items{margin-top:14px;color:#ddd;line-height:1.8}
  .track{display:inline-block;margin-top:12px;color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">R<span>.</span>Street</a>
  <a href="catalogo.html">Catalogo</a>
</nav>
<main>
  <h1>Acompanhar Pedido</h1>
  <p class="intro">Digite o numero do pedido e o e-mail usado na compra para consultar pagamento, envio e rastreio.</p>
  <div class="box">
    <label for="pedidoId">Numero do pedido</label>
    <input id="pedidoId" inputmode="numeric" placeholder="Ex: 48">
    <label for="pedidoEmail">E-mail da compra</label>
    <input id="pedidoEmail" type="email" placeholder="seuemail@exemplo.com">
    <button onclick="consultarPedido()" id="btnConsultar">Consultar pedido</button>
    <div class="msg" id="msg"></div>
  </div>
  <div class="result" id="resultado"></div>
</main>
<script>
const BACKEND_BASE = 'https://rstreet-backend.onrender.com/api';
const ENVIO_LABEL = {
  aguardando_envio: 'Aguardando envio',
  enviado: 'Enviado',
  entregue: 'Entregue',
  retirada_disponivel: 'Retirada disponivel',
  retirado: 'Retirado'
};

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[char]);
}

function fmtMoney(value) {
  return 'R$ ' + Number(value || 0).toFixed(2).replace('.', ',');
}

function showError(text) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg error';
}

async function consultarPedido() {
  const id = document.getElementById('pedidoId').value.trim();
  const email = document.getElementById('pedidoEmail').value.trim();
  const btn = document.getElementById('btnConsultar');
  const msg = document.getElementById('msg');
  const resultado = document.getElementById('resultado');
  msg.className = 'msg';
  msg.textContent = '';
  resultado.className = 'result';
  resultado.innerHTML = '';

  if (!id || !email) return showError('Informe o numero do pedido e o e-mail da compra.');

  btn.disabled = true;
  btn.textContent = 'Consultando...';
  try {
    const res = await fetch(`${BACKEND_BASE}/pedidos/acompanhar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, email })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.erro || 'Pedido nao encontrado.');

    const p = data.pedido;
    const itens = data.itens || [];
    resultado.innerHTML = `
      <div class="row"><span>Pedido</span><strong>#${escapeHtml(p.id)}</strong></div>
      <div class="row"><span>Status do pagamento</span><strong>${escapeHtml(p.status)}</strong></div>
      <div class="row"><span>Status do envio</span><strong>${escapeHtml(ENVIO_LABEL[p.envio_status] || 'Aguardando envio')}</strong></div>
      <div class="row"><span>Total</span><strong>${fmtMoney(p.total)}</strong></div>
      ${p.codigo_rastreio ? `<div class="row"><span>Rastreio</span><strong>${escapeHtml(p.codigo_rastreio)}</strong></div>` : ''}
      ${p.rastreio_url ? `<a class="track" href="${escapeHtml(p.rastreio_url)}" target="_blank">Abrir rastreio</a>` : ''}
      <div class="items">
        <strong>Itens</strong><br>
        ${itens.map(i => `${escapeHtml(i.quantidade)}x ${escapeHtml(i.nome_produto)}${i.cor ? ' - '+escapeHtml(i.cor) : ''}${i.tamanho ? ' / '+escapeHtml(i.tamanho) : ''}`).join('<br>') || 'Itens indisponiveis'}
      </div>`;
    resultado.className = 'result open';
  } catch (err) {
    showError(err.message || 'Nao foi possivel consultar o pedido.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Consultar pedido';
  }
}
</script>
</body>
</html>
